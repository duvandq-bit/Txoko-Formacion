<!-- @dsCard group="Components" name="Menú principal desplegable" subtitle="Inicio/Aprender/Examen… estilo Tenet" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Txoko · Nav principal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#c49a3c; --gold3:#e4be68; --line:rgba(196,154,60,.14);
    --font-sans:'Quicksand',sans-serif; --font-serif:'Cinzel',serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4ede2;color:#1c2a22;font-family:var(--font-sans);margin:0}
  .demo-note{padding:1rem 1rem .3rem;font-family:'DM Mono',monospace;font-size:.6rem;color:#8a8478;letter-spacing:.14em;text-transform:uppercase}
  .blurb{padding:0 1rem 1rem;font-size:.74rem;color:rgba(28,42,34,.7);line-height:1.45}
  .blurb b{color:#7d5c2f}

  /* header (real look) */
  .hdr{background:linear-gradient(145deg,#d4b87a 0%,#c49a3c 30%,#9a7340 70%,#7d5c2f 100%);
    height:56px;display:flex;align-items:center;padding:0 1rem;gap:.6rem}
  .logo{font-family:var(--font-serif);font-weight:700;color:#fff;font-size:1.15rem;letter-spacing:.06em;flex:1}
  .hdr-ico{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;color:#fff}

  /* nav dropdown */
  .nav-dd{position:relative;z-index:90;background:#25352b;padding:.55rem .8rem}
  .nav-dd-trigger{display:flex;align-items:center;justify-content:space-between;gap:.6rem;width:100%;min-height:50px;
    border-radius:12px;padding:.75rem 1.05rem;cursor:pointer;border:1px solid rgba(196,154,60,.35);
    font-family:var(--font-serif);font-weight:600;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;
    color:#e4be68;background:linear-gradient(145deg,#1c2a22,#243028)}
  .nav-dd-cur{display:flex;align-items:center;gap:.6rem}
  .nav-dd-cur svg{width:18px;height:18px}
  .nav-dd-chev{color:var(--gold);font-size:.85rem}
  .nav-dd-list{margin-top:.5rem;border-radius:14px;overflow:hidden;background:#faf6ee;border:1px solid rgba(196,154,60,.3);box-shadow:0 12px 30px rgba(28,42,34,.2)}
  .nav-item{display:flex;align-items:center;gap:.85rem;width:100%;min-height:56px;padding:.9rem 1.1rem;
    border:none;border-left:4px solid transparent;background:transparent;cursor:pointer;text-align:left;
    font-family:var(--font-serif);font-weight:500;font-size:.9rem;color:rgba(28,42,34,.75)}
  .nav-item + .nav-item{border-top:1px solid rgba(196,154,60,.14)}
  .nav-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.6;flex-shrink:0}
  .nav-item.on{color:#7d5c2f;background:rgba(196,154,60,.1);border-left-color:var(--gold);font-weight:600}
  .ic{display:inline-flex}
</style>
</head>
<body>
  <div class="demo-note">Cerrado</div>
  <div class="blurb">La barra de nav (que hoy esconde LQA, Vinos, Juegos, Ranking en el scroll) pasa a un
    <b>trigger</b> con la sección actual + flecha.</div>
  <div class="hdr"><span class="hdr-ico">TR</span><span class="logo">TXOKO</span><span class="hdr-ico">☰</span></div>
  <div class="nav-dd">
    <button class="nav-dd-trigger"><span class="nav-dd-cur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg> Inicio</span><span class="nav-dd-chev">▾</span></button>
  </div>

  <div class="demo-note" style="margin-top:1.5rem">Abierto — las 8 secciones visibles</div>
  <div class="blurb">Un tap despliega <b>todas</b>. La activa lleva barra de acento. Nada escondido.</div>
  <div class="hdr"><span class="hdr-ico">TR</span><span class="logo">TXOKO</span><span class="hdr-ico">✕</span></div>
  <div class="nav-dd">
    <button class="nav-dd-trigger"><span class="nav-dd-cur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg> Inicio</span><span class="nav-dd-chev">▴</span></button>
    <div class="nav-dd-list">
      <button class="nav-item on"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>Inicio</button>
      <button class="nav-item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></span>Aprender</button>
      <button class="nav-item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg></span>Examen</button>
      <button class="nav-item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span>LQA</button>
      <button class="nav-item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M8 2h8l-2 9H10L8 2z"/><path d="M12 11v7"/><path d="M8 18h8"/></svg></span>Vinos</button>
      <button class="nav-item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M6 12h4l2 8 4-16 2 8h4"/></svg></span>Juegos</button>
      <button class="nav-item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>Ranking</button>
    </div>
  </div>
</body>
</html>
